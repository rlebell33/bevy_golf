<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevy Golf 🏌️</title>
  <!-- Trunk will replace this link with the compiled WASM + JS bundle -->
  <link data-trunk rel="rust" data-wasm-opt="z" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d2b0d;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: #fff;
    }
    #bevy {
      display: block;
      /* Keep the canvas crisp on high-DPI screens */
      image-rendering: pixelated;
    }
    #info {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <canvas id="bevy"></canvas>
  <div id="info">Bevy Golf — built with Rust 🦀 &amp; Bevy</div>
</body>
</html>
