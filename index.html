<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevy Golf 🏌️</title>
  <script>
    // Intercept AudioContext creation to capture Bevy's instance and resume
    // it on the first user gesture. Browsers suspend any AudioContext created
    // before user interaction; calling .resume() inside a gesture handler is
    // the only reliable way to unblock it.
    (function () {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      var _Orig = Ctx;
      function PatchedCtx() {
        var ctx = new (Function.prototype.bind.apply(_Orig, [null].concat(Array.prototype.slice.call(arguments))))();
        window.__bevyAudioCtx = ctx;
        return ctx;
      }
      PatchedCtx.prototype = _Orig.prototype;
      window.AudioContext = PatchedCtx;
      if (window.webkitAudioContext) window.webkitAudioContext = PatchedCtx;
      function resume() {
        if (window.__bevyAudioCtx && window.__bevyAudioCtx.state !== 'running') {
          window.__bevyAudioCtx.resume();
        }
      }
      document.addEventListener('click', resume);
      document.addEventListener('keydown', resume);
    })();
  </script>
  <!-- Trunk will replace this link with the compiled WASM + JS bundle -->
  <link data-trunk rel="rust" />
  <!-- Copy the assets folder into the dist output -->
  <link data-trunk rel="copy-dir" href="assets" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d2b0d;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: #fff;
    }
    #bevy {
      display: block;
      width: 800px;
      height: 600px;
      /* Keep the canvas crisp on high-DPI screens */
      image-rendering: pixelated;
    }
    #info {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <canvas id="bevy" width="800" height="600"></canvas>
  <div id="info">Bevy Golf — built with Rust 🦀 &amp; Bevy</div>
</body>
</html>
